name: 'PR Dependency Guard'
description: "Block merging a PR until its declared prerequisite PRs are merged. Reads 'Depends on #N' from PR body and 'depends-on-N' labels."
author: 'BoBeenLee'
branding:
  icon: 'lock'
  color: 'orange'

inputs:
  github-token:
    description: 'GitHub token with pull-requests:write permission'
    required: false
    default: ${{ github.token }}
  target-branches:
    description: 'Comma-separated branches to enforce on. PRs targeting other branches pass silently.'
    required: false
    default: 'main,develop,master'
  bypass-label:
    description: "Label name that, when present on the PR, skips the check (records bypass in the sticky comment)."
    required: false
    default: 'skip-dependency-check'
  keywords:
    description: "Comma-separated case-insensitive keywords recognized in the PR body before '#N'."
    required: false
    default: 'Depends on,Blocked by,After'
  label-prefix:
    description: "Label prefix that declares a dependency. 'depends-on-123' means this PR depends on PR #123."
    required: false
    default: 'depends-on-'

runs:
  using: 'composite'
  steps:
    - name: Check PR dependencies
      uses: actions/github-script@v7
      env:
        INPUT_TARGET_BRANCHES: ${{ inputs.target-branches }}
        INPUT_BYPASS_LABEL: ${{ inputs.bypass-label }}
        INPUT_KEYWORDS: ${{ inputs.keywords }}
        INPUT_LABEL_PREFIX: ${{ inputs.label-prefix }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const STICKY_MARKER = '<!-- pr-dependency-guard:sticky -->';

          const pr = context.payload.pull_request;
          if (!pr) {
            core.info('No pull_request in payload; skipping.');
            return;
          }

          const targetBranches = (process.env.INPUT_TARGET_BRANCHES || '')
            .split(',').map(s => s.trim()).filter(Boolean);
          const bypassLabel = (process.env.INPUT_BYPASS_LABEL || '').trim();
          const keywords = (process.env.INPUT_KEYWORDS || '')
            .split(',').map(s => s.trim()).filter(Boolean);
          const labelPrefix = (process.env.INPUT_LABEL_PREFIX || '').trim();

          const { owner, repo } = context.repo;
          const prNumber = pr.number;
          const baseRef = pr.base && pr.base.ref;
          const labels = (pr.labels || []).map(l => l.name);

          core.info(`PR #${prNumber} → ${baseRef}`);
          core.info(`Target branches: ${targetBranches.join(', ') || '(none)'}`);

          // 1. target-branches 필터
          if (targetBranches.length > 0 && !targetBranches.includes(baseRef)) {
            core.info(`Base branch '${baseRef}' not in target-branches; skipping.`);
            return;
          }

          // sticky 코멘트 유틸
          async function findSticky() {
            const it = github.paginate.iterator(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            for await (const { data } of it) {
              for (const c of data) {
                if (c.body && c.body.startsWith(STICKY_MARKER)) return c;
              }
            }
            return null;
          }
          async function upsertSticky(body) {
            const full = `${STICKY_MARKER}\n${body}`;
            const existing = await findSticky();
            if (existing) {
              if (existing.body !== full) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: full });
              }
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: full });
            }
          }
          async function deleteSticky() {
            const existing = await findSticky();
            if (existing) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
            }
          }

          // 2. bypass 라벨
          if (bypassLabel && labels.includes(bypassLabel)) {
            await upsertSticky(
              `### PR Dependency Guard — bypassed\n\n` +
              `This PR carries the \`${bypassLabel}\` label, so dependency checks were skipped.\n\n` +
              `_Remove the label to re-enable enforcement._`
            );
            core.warning(`Bypass label '${bypassLabel}' present; skipping enforcement.`);
            return;
          }

          // 3. 의존성 추출
          // 본문에서 HTML 주석을 제거한 뒤 키워드 매칭
          const body = (pr.body || '').replace(/<!--[\s\S]*?-->/g, '');
          const keywordAlt = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
          const bodyRegex = keywordAlt
            ? new RegExp(`(?:${keywordAlt})\\s+#(\\d+)`, 'gi')
            : null;

          const fromBody = new Set();
          if (bodyRegex) {
            for (const m of body.matchAll(bodyRegex)) fromBody.add(Number(m[1]));
          }

          const fromLabels = new Set();
          if (labelPrefix) {
            const escPrefix = labelPrefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const labelRegex = new RegExp(`^${escPrefix}(\\d+)$`, 'i');
            for (const name of labels) {
              const m = name.match(labelRegex);
              if (m) fromLabels.add(Number(m[1]));
            }
          }

          const deps = new Set([...fromBody, ...fromLabels]);
          deps.delete(prNumber); // 자기 자신 제외

          if (deps.size === 0) {
            await deleteSticky();
            core.info('No prerequisite PRs declared. Passing.');
            return;
          }

          // 4. 각 의존성 PR 상태 조회
          const merged = [];
          const blockers = [];
          const missing = [];

          for (const n of [...deps].sort((a, b) => a - b)) {
            try {
              const { data } = await github.rest.pulls.get({ owner, repo, pull_number: n });
              if (data.merged_at) merged.push({ n, title: data.title, url: data.html_url });
              else blockers.push({ n, title: data.title, state: data.state, url: data.html_url });
            } catch (e) {
              if (e.status === 404) missing.push(n);
              else throw e;
            }
          }

          // 5. 결과 보고
          const lines = ['### PR Dependency Guard'];
          lines.push('');
          lines.push(`Sources scanned: PR body keywords (${keywords.join(', ') || 'none'}), labels (\`${labelPrefix}N\`).`);
          lines.push('');
          if (blockers.length > 0) {
            lines.push('**Blocking — these prerequisite PRs are not yet merged:**');
            for (const b of blockers) lines.push(`- [#${b.n}](${b.url}) (${b.state}) — ${b.title}`);
            lines.push('');
          }
          if (missing.length > 0) {
            lines.push('**Unknown PR numbers (possible typo):**');
            for (const n of missing) lines.push(`- #${n}`);
            lines.push('');
          }
          if (merged.length > 0) {
            lines.push('**Already merged:**');
            for (const m of merged) lines.push(`- [#${m.n}](${m.url}) — ${m.title}`);
            lines.push('');
          }
          lines.push(`To bypass in an emergency, apply the \`${bypassLabel}\` label.`);

          await upsertSticky(lines.join('\n'));

          if (blockers.length > 0 || missing.length > 0) {
            const reasons = [];
            if (blockers.length) reasons.push(`${blockers.length} unmerged prerequisite PR(s)`);
            if (missing.length) reasons.push(`${missing.length} unknown PR reference(s)`);
            core.setFailed(`Merge blocked: ${reasons.join(', ')}.`);
          } else {
            core.info('All declared prerequisite PRs are merged. Passing.');
          }
